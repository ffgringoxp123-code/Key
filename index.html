<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Key Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #111;
            border: 1px solid #ff8cbb33;
            border-radius: 16px;
            padding: 40px;
            width: 520px;
            max-width: 95%;
            box-shadow: 0 0 60px rgba(255, 140, 187, 0.08);
        }
        h1 {
            text-align: center;
            font-size: 32px;
            color: #ff8cbb;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 140, 187, 0.3);
        }
        .sub {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: 500;
        }
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        input[type="number"]:focus, input[type="text"]:focus {
            border-color: #ff8cbb;
            box-shadow: 0 0 12px rgba(255, 140, 187, 0.15);
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row input[type="text"] {
            flex: 1;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            font-size: 16px;
            color: #66ff99;
        }
        .btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, #ff8cbb, #e06ba0);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 1px;
            white-space: nowrap;
        }
        .btn:hover {
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(255, 140, 187, 0.3);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-copy {
            background: #2a2a2a;
            color: #fff;
        }
        .btn-copy:hover {
            background: #3a3a3a;
            box-shadow: none;
            transform: scale(1.03);
        }
        .key-display {
            background: #0d0d0d;
            border: 1px dashed #333;
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
            text-align: center;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            letter-spacing: 3px;
            color: #66ff99;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 10px rgba(102, 255, 153, 0.15);
        }
        .key-display.empty {
            color: #444;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .info {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }
        .info span {
            color: #ffcc00;
        }
        .info .expired {
            color: #ff4444;
        }
        .info .active {
            color: #66ff99;
        }
        .status-msg {
            text-align: center;
            font-size: 13px;
            margin-top: 16px;
            min-height: 20px;
            color: #ffcc00;
        }
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #333;
            letter-spacing: 1px;
        }
        .badge {
            display: inline-block;
            background: #ff8cbb22;
            color: #ff8cbb;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            margin-left: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>SAKURA</h1>
    <div class="sub">KEY GENERATOR <span class="badge">v2.0</span></div>
    <div class="form-group">
        <label>Thoi gian het han (ngay)</label>
        <input type="number" id="dayInput" value="7" min="1" max="365">
    </div>
    <button class="btn" id="generateBtn" style="width:100%;margin-bottom:16px;">TAO KEY MOI</button>
    <div class="key-display empty" id="keyDisplay">Chua co key. Nhan "Tao key moi" de bat dau.</div>
    <div class="info" id="infoArea">
        <span>Trang thai: <span id="statusText">—</span></span>
        <span>Het han: <span id="expiryText">—</span></span>
    </div>
    <div class="row" style="margin-top:16px;gap:10px;">
        <input type="text" id="copyField" placeholder="Nhap key de kiem tra..." readonly>
        <button class="btn btn-copy" id="copyBtn">COPY</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="footer">SAKURA BETA · KEY TU DONG HUY SAU THOI GIAN CAI DAT</div>
</div>

<script>
(function() {
    var dayInput = document.getElementById('dayInput');
    var generateBtn = document.getElementById('generateBtn');
    var keyDisplay = document.getElementById('keyDisplay');
    var copyField = document.getElementById('copyField');
    var copyBtn = document.getElementById('copyBtn');
    var statusText = document.getElementById('statusText');
    var expiryText = document.getElementById('expiryText');
    var statusMsg = document.getElementById('statusMsg');

    function generateKey(length) {
        var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
        var key = '';
        for (var i = 0; i < length; i++) {
            key += chars.charAt(Math.floor(Math.random() * chars.length));
            if ((i + 1) % 6 === 0 && i < length - 1) key += '-';
        }
        return key;
    }

    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function formatDate(ts) {
        var d = new Date(ts);
        return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function setMsg(text, color) {
        statusMsg.textContent = text;
        statusMsg.style.color = color || '#ffcc00';
    }

    function saveKey(key, expiry) {
        try {
            localStorage.setItem('sakura_key', key);
            localStorage.setItem('sakura_expiry', String(expiry));
        } catch(e) {}
    }

    function loadKey() {
        try {
            var key = localStorage.getItem('sakura_key');
            var expiry = localStorage.getItem('sakura_expiry');
            return { key: key, expiry: expiry ? parseInt(expiry, 10) : null };
        } catch(e) {
            return { key: null, expiry: null };
        }
    }

    function clearKey() {
        try {
            localStorage.removeItem('sakura_key');
            localStorage.removeItem('sakura_expiry');
        } catch(e) {}
    }

    function isExpired(expiry) {
        return Date.now() > expiry;
    }

    function renderState() {
        var data = loadKey();
        var key = data.key;
        var expiry = data.expiry;

        if (!key || !expiry) {
            keyDisplay.textContent = 'Chua co key. Nhan "Tao key moi" de bat dau.';
            keyDisplay.className = 'key-display empty';
            statusText.textContent = '—';
            statusText.className = '';
            expiryText.textContent = '—';
            copyField.value = '';
            return;
        }

        var expired = isExpired(expiry);
        keyDisplay.textContent = key;
        keyDisplay.className = 'key-display';

        if (expired) {
            statusText.textContent = 'HET HAN';
            statusText.className = 'expired';
            keyDisplay.style.color = '#ff4444';
            keyDisplay.style.textShadow = '0 0 10px rgba(255,68,68,0.15)';
        } else {
            statusText.textContent = 'CON HIEU LUC';
            statusText.className = 'active';
            keyDisplay.style.color = '#66ff99';
            keyDisplay.style.textShadow = '0 0 10px rgba(102,255,153,0.15)';
        }

        expiryText.textContent = formatDate(expiry);
        copyField.value = key;
    }

    function generateNewKey() {
        var days = parseInt(dayInput.value, 10);
        if (isNaN(days) || days < 1) days = 1;
        if (days > 365) days = 365;
        dayInput.value = days;

        var newKey = generateKey(24);
        var expiry = Date.now() + days * 24 * 60 * 60 * 1000;

        saveKey(newKey, expiry);
        renderState();
        setMsg('Key moi da duoc tao! Het han sau ' + days + ' ngay.', '#66ff99');
    }

    function copyKey() {
        var data = loadKey();
        var key = data.key;
        var expiry = data.expiry;

        if (!key) {
            setMsg('Khong co key de copy. Hay tao key truoc.', '#ff4444');
            return;
        }

        if (expiry && isExpired(expiry)) {
            setMsg('Key da het han. Hay tao key moi.', '#ff4444');
            return;
        }

        copyField.value = key;
        copyField.select();
        copyField.setSelectionRange(0, 99999);

        try {
            navigator.clipboard.writeText(key).then(function() {
                setMsg('Da copy key!', '#66ff99');
            }).catch(function() {
                document.execCommand('copy');
                setMsg('Da copy key!', '#66ff99');
            });
        } catch(e) {
            document.execCommand('copy');
            setMsg('Da copy key!', '#66ff99');
        }
    }

    setInterval(function() {
        var data = loadKey();
        var key = data.key;
        var expiry = data.expiry;
        if (key && expiry) {
            var wasActive = !isExpired(expiry);
            renderState();
            var nowExpired = isExpired(expiry);
            if (wasActive && nowExpired) {
                setMsg('Key da het han! Hay tao key moi.', '#ff4444');
            }
        }
    }, 1000);

    generateBtn.addEventListener('click', generateNewKey);
    copyBtn.addEventListener('click', copyKey);

    dayInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') generateNewKey();
    });

    var data = loadKey();
    var key = data.key;
    var expiry = data.expiry;
    if (key && expiry && isExpired(expiry)) {
        setMsg('Key cu da het han. Tao key moi de tiep tuc.', '#ff4444');
    }
    renderState();
})();
</script>
</body>
</html>
